<div class="table-wrap"><table><thead><tr><th>Nama</th><th>Kategori</th><th>Level</th><th>Aksi</th></tr></thead><tbody>{% for s in items %}<tr><td>{{ s.name }}</td><td>{{ s.category }}</td><td>{{ s.level }}%</td><td class="actions"><a href="{{ url_for('admin_skills', item_id=s.id) }}">Edit</a><form method="POST" action="{{ url_for('delete_skill', item_id=s.id) }}" onsubmit="return confirm('Hapus skill ini?')"><button>Hapus</button></form></td></tr>{% else %}<tr><td colspan="4">Belum ada data.</td></tr>{% endfor %}</tbody></table></div>
