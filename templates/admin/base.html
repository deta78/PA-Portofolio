<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Admin Portfolio{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='admin/css/base.css') }}">
</head>
<body>
  <aside class="sidebar">
    <a class="brand" href="{{ url_for('admin_dashboard') }}">Admin</a>
    <nav>
      <a href="{{ url_for('admin_dashboard') }}">Dashboard</a>
      <a href="{{ url_for('admin_profiles') }}">Profil</a>
      <a href="{{ url_for('admin_about') }}">Tentang</a>
      <a href="{{ url_for('admin_skills') }}">Skill</a>
      <a href="{{ url_for('admin_experiences') }}">Pengalaman</a>
      <a href="{{ url_for('admin_projects') }}">Proyek</a>
      <a href="{{ url_for('admin_contacts') }}">Kontak</a>
      <a href="{{ url_for('admin_logout') }}">Logout</a>
    </nav>
  </aside>

  <main class="admin-main">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="flash-list">
          {% for category, message in messages %}
            <div class="flash {{ category }}">{{ message }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
  </main>
  <script src="{{ url_for('static', filename='admin/js/admin.js') }}"></script>
</body>
</html>
